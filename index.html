<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H.2 Collection — Store Locator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0a0a0a;
      --red:    #cc1a1a;
      --white:  #ffffff;
      --light:  #f7f7f7;
      --mid:    #e8e8e8;
      --muted:  #888888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--mid);
      padding: 24px 20px 20px;
      text-align: center;
    }

    header img {
      height: 52px;
      width: auto;
      display: block;
      margin: 0 auto 14px;
    }

    header .tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN ────────────────────────────────────── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── LOCATE BUTTON ───────────────────────────── */
    #locate-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    #locate-btn:hover  { background: #222; }
    #locate-btn:disabled { background: #999; cursor: default; }

    /* ── STATUS ──────────────────────────────────── */
    #status {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    #status.error { color: var(--red); }

    /* ── CLOSEST CARD ────────────────────────────── */
    #closest-card {
      display: none;
      margin-top: 28px;
      border: 1px solid var(--black);
      padding: 28px 24px;
    }

    #closest-card .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
    }

    #closest-card .store-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    #closest-card .store-address {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }

    #closest-card .distance {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 22px;
    }

    .map-buttons {
      display: flex;
      gap: 10px;
    }

    .map-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 10px;
      border: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .map-btn:hover { opacity: 0.8; }

    .map-btn.google {
      background: var(--black);
      color: var(--white);
    }

    .map-btn.apple {
      background: var(--white);
      color: var(--black);
      border: 1px solid var(--black);
    }

    /* ── DIVIDER ─────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px 0 20px;
    }

    .divider span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--mid);
    }

    /* ── STORE LIST ──────────────────────────────── */
    #store-list {
      display: flex;
      flex-direction: column;
    }

    .store-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--mid);
      transition: background 0.1s;
    }

    .store-item:first-child { border-top: 1px solid var(--mid); }

    .store-item.highlighted .city {
      color: var(--red);
    }

    .store-item-left .city {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .store-item-left .addr {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    .store-item-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .store-dist {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .store-dist.near { color: var(--red); }

    .mini-btns {
      display: flex;
      gap: 6px;
    }

    .mini-map-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--mid);
      text-decoration: none;
      font-size: 14px;
      transition: border-color 0.15s, background 0.15s;
      color: var(--black);
    }

    .mini-map-btn:hover {
      border-color: var(--black);
      background: var(--light);
    }

    /* ── WEBSITE BUTTON ─────────────────────────── */
    #website-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      padding: 9px 18px;
      border: 1px solid var(--mid);
      background: var(--white);
      color: var(--black);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #website-btn:hover {
      border-color: var(--black);
      background: var(--light);
    }

    /* ── MAP ─────────────────────────────────────── */
    #store-map {
      display: none;
      margin-top: 20px;
      height: 240px;
      border: 1px solid var(--mid);
    }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--mid);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <img src="h2logo.png" alt="H.2 Collection" />
  <div class="tagline">Trova il negozio più vicino</div>
  <a id="website-btn" href="https://www.h2collection.it" target="_blank" rel="noopener">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    Visita h2collection.it
  </a>
</header>

<main>

  <button id="locate-btn" onclick="locateUser()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
      <circle cx="12" cy="12" r="8"/>
    </svg>
    Usa la mia posizione
  </button>

  <div id="status">Attiva la geolocalizzazione per trovare lo store più vicino.</div>

  <div id="closest-card">
    <div class="label">Il negozio più vicino a te</div>
    <div class="store-name" id="card-city"></div>
    <div class="store-address" id="card-address"></div>
    <div class="distance" id="card-distance"></div>
    <div id="store-map"></div>
    <div class="map-buttons">
      <a id="card-google" class="map-btn google" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5 14.5 7.62 14.5 9 13.38 11.5 12 11.5z"/></svg>
        Google Maps
      </a>
      <a id="card-apple" class="map-btn apple" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5 14.5 7.62 14.5 9 13.38 11.5 12 11.5z"/></svg>
        Apple Maps
      </a>
    </div>
  </div>

  <div class="divider"><span>Tutti gli store</span></div>
  <div id="store-list"></div>

</main>

<footer>© H.2 Collection® — Sicilia</footer>

<script>
  const STORES = [
    { city: "Acireale",        address: "Corso Sicilia 5,6/7",              lat: 37.6117,  lng: 15.1656 },
    { city: "Alcamo",          address: "Corso 6 Aprile, 237",              lat: 37.9797,  lng: 12.9642 },
    { city: "Augusta",         address: "Viale Italia 113",                 lat: 37.2317,  lng: 15.2244 },
    { city: "Bagheria",        address: "Corso Butera 444",                 lat: 38.0778,  lng: 13.5125 },
    { city: "Caltanissetta",   address: "Via Palmiro Togliatti 20",         lat: 37.4906,  lng: 14.0633 },
    { city: "Catania",         address: "Via Umberto I, 10/12",             lat: 37.5023,  lng: 15.0873 },
    { city: "Catania",         address: "Via Mario Rapisardi, 279",         lat: 37.5200,  lng: 15.0950 },
    { city: "Catania",         address: "Via Giuseppe Simili, 32/34",       lat: 37.4950,  lng: 15.0800 },
    { city: "Gela",            address: "Corso Vittorio Emanuele 310",      lat: 37.0647,  lng: 14.2519 },
    { city: "Lentini",         address: "Via Etnea, 8A",                    lat: 37.2855,  lng: 14.9999 },
    { city: "Messina",         address: "Via dei Mille 117",                lat: 38.1938,  lng: 15.5540 },
    { city: "Messina",         address: "Via Catania 475",                  lat: 38.1750,  lng: 15.5550 },
    { city: "Modica",          address: "Variante SS115 2/6",               lat: 36.8700,  lng: 14.7500 },
    { city: "Modica",          address: "Corso Umberto I 129",              lat: 36.8582,  lng: 14.7641 },
    { city: "Monreale",        address: "Via Venero, 176",                  lat: 38.0814,  lng: 13.2921 },
    { city: "Palermo",         address: "Corso Calatafimi 379",             lat: 38.1157,  lng: 13.3615 },
    { city: "Partanna",        address: "Via Vittorio Emanuele 166",        lat: 37.7258,  lng: 12.8882 },
    { city: "Pozzallo",        address: "Corso Vittorio Veneto 86",         lat: 36.7294,  lng: 14.8475 },
    { city: "Ragusa",          address: "Via Archimede 141",                lat: 36.9249,  lng: 14.7252 },
    { city: "Ramacca",         address: "Viale G. Santagati 34/36",         lat: 37.3843,  lng: 14.6956 },
    { city: "Riposto",         address: "Conforama, Strada N 18, 43",       lat: 37.7297,  lng: 15.2047 },
    { city: "Rosolini",        address: "Piazza Europa 2",                  lat: 36.8228,  lng: 14.9481 },
    { city: "Sciacca",         address: "Via Giuseppe Licata, 147",         lat: 37.5082,  lng: 13.0880 },
    { city: "Scordia",         address: "Via Niccolò Machiavelli, 16",      lat: 37.2966,  lng: 14.8490 },
    { city: "Siracusa",        address: "Viale Zecchino 187",               lat: 37.0755,  lng: 15.2866 },
    { city: "Siracusa",        address: "Via Mosco 66/A",                   lat: 37.0700,  lng: 15.2900 },
    { city: "Termini Imerese", address: "Via Francesco Crispi, 6/7",        lat: 37.9858,  lng: 13.6963 },
  ];

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function googleMapsUrl(store) {
    const q = encodeURIComponent(`${store.address}, ${store.city}, Sicilia, Italia`);
    return `https://www.google.com/maps/dir/?api=1&destination=${q}`;
  }

  function appleMapsUrl(store) {
    const q = encodeURIComponent(`${store.address}, ${store.city}, Sicilia, Italia`);
    return `https://maps.apple.com/?daddr=${q}&dirflg=d`;
  }

  function formatDist(km) {
    return km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(1)} km`;
  }

  function renderList(distances) {
    const list = document.getElementById("store-list");
    list.innerHTML = "";

    const items = STORES.map((s, i) => ({ ...s, dist: distances ? distances[i] : null }));
    if (distances) items.sort((a, b) => a.dist - b.dist);

    items.forEach((store, idx) => {
      const item = document.createElement("div");
      item.className = "store-item" + (distances && idx === 0 ? " highlighted" : "");

      const distHtml = store.dist !== null
        ? `<div class="store-dist${store.dist < 10 ? " near" : ""}">${formatDist(store.dist)}</div>`
        : "";

      item.innerHTML = `
        <div class="store-item-left">
          <div class="city">${store.city}</div>
          <div class="addr">${store.address}</div>
        </div>
        <div class="store-item-right">
          ${distHtml}
          <div class="mini-btns">
            <a class="mini-map-btn" href="${googleMapsUrl(store)}" target="_blank" rel="noopener" title="Google Maps">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5 14.5 7.62 14.5 9 13.38 11.5 12 11.5z"/></svg>
            </a>
            <a class="mini-map-btn" href="${appleMapsUrl(store)}" target="_blank" rel="noopener" title="Apple Maps">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.39.07 2.35.74 3.15.8 1.2-.24 2.35-.93 3.64-.84 1.54.12 2.7.71 3.44 1.8-3.18 1.94-2.43 5.86.48 6.95-.57 1.56-1.32 3.09-2.71 4.15zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            </a>
          </div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function locateUser() {
    if (!navigator.geolocation) {
      setStatus("Il tuo browser non supporta la geolocalizzazione.", true);
      return;
    }

    const btn = document.getElementById("locate-btn");
    btn.disabled = true;
    setStatus("Rilevamento posizione in corso…");

    navigator.geolocation.getCurrentPosition(
      ({ coords: { latitude, longitude } }) => {
        const distances = STORES.map(s => haversineKm(latitude, longitude, s.lat, s.lng));
        const minIdx = distances.indexOf(Math.min(...distances));
        const closest = STORES[minIdx];

        document.getElementById("card-city").textContent = closest.city;
        document.getElementById("card-address").textContent = closest.address;
        document.getElementById("card-distance").textContent = `A ${formatDist(distances[minIdx])} da te`;
        document.getElementById("card-google").href = googleMapsUrl(closest);
        document.getElementById("card-apple").href = appleMapsUrl(closest);
        document.getElementById("closest-card").style.display = "block";

        showMap(closest.lat, closest.lng, latitude, longitude);

        setStatus("");
        renderList(distances);
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
            <circle cx="12" cy="12" r="8"/>
          </svg>
          Aggiorna posizione`;
      },
      (err) => {
        const msgs = {
          1: "Permesso negato. Abilita la posizione nelle impostazioni del browser.",
          2: "Posizione non disponibile. Riprova.",
          3: "Richiesta scaduta. Riprova.",
        };
        setStatus(msgs[err.code] || "Impossibile ottenere la posizione.", true);
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  renderList(null);
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let leafletMap = null;

  function showMap(storeLat, storeLng, userLat, userLng) {
    const mapEl = document.getElementById("store-map");
    mapEl.style.display = "block";

    if (leafletMap) {
      leafletMap.remove();
      leafletMap = null;
    }

    leafletMap = L.map("store-map", { zoomControl: true, scrollWheelZoom: false });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(leafletMap);

    const storeIcon = L.divIcon({
      className: "",
      html: `<div style="width:14px;height:14px;background:#cc1a1a;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });

    const userIcon = L.divIcon({
      className: "",
      html: `<div style="width:12px;height:12px;background:#0a0a0a;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6],
    });

    L.marker([storeLat, storeLng], { icon: storeIcon })
      .addTo(leafletMap)
      .bindPopup("<b>H.2 Collection</b>")
      .openPopup();

    L.marker([userLat, userLng], { icon: userIcon })
      .addTo(leafletMap)
      .bindPopup("La tua posizione");

    const bounds = L.latLngBounds([[storeLat, storeLng], [userLat, userLng]]);
    leafletMap.fitBounds(bounds, { padding: [40, 40] });
  }
</script>

</body>
</html>
