<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H.2 Collection — Store Locator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0a0a0a;
      --red:    #cc1a1a;
      --white:  #ffffff;
      --light:  #f7f7f7;
      --mid:    #e8e8e8;
      --muted:  #888888;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      padding-bottom: calc(20px + var(--safe-b));
    }

    /* ── HEADER ──────────────────────────────────── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--mid);
      padding: 20px 16px 16px;
      text-align: center;
    }

    header img {
      height: 44px;
      width: auto;
      display: block;
      margin: 0 auto 10px;
    }

    header .tagline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    #website-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border: 1px solid var(--mid);
      background: var(--white);
      color: var(--black);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    #website-btn:active { background: var(--light); border-color: var(--black); }

    /* ── MAIN ────────────────────────────────────── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 16px 16px;
    }

    /* ── CHOICE SCREEN ───────────────────────────── */
    #choice-screen {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 22px 20px;
      border: 1px solid var(--black);
      background: var(--white);
      color: var(--black);
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .choice-btn:active { background: var(--light); }

    .choice-btn.primary {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .choice-btn.primary:active { background: #333; }

    .choice-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choice-btn.primary .choice-icon {
      background: rgba(255,255,255,0.12);
    }

    .choice-btn.secondary .choice-icon {
      background: var(--light);
    }

    .choice-text-wrap { flex: 1; }

    .choice-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }

    .choice-sub {
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 0.2px;
    }

    .choice-btn.primary .choice-sub { opacity: 0.55; }

    .choice-arrow {
      flex-shrink: 0;
      opacity: 0.4;
    }

    /* ── STATUS ──────────────────────────────────── */
    #status {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    #status.error { color: var(--red); }

    /* ── BACK LINK ───────────────────────────────── */
    #back-btn {
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      background: none;
      border: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }

    #back-btn:active { color: var(--black); }

    /* ── CLOSEST CARD ────────────────────────────── */
    #closest-card {
      display: none;
      margin-bottom: 28px;
      border: 1px solid var(--black);
      padding: 22px 18px 20px;
    }

    #closest-card .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }

    #closest-card .store-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    #closest-card .store-address {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    #closest-card .distance {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 18px;
    }

    /* ── CARD PHONE ──────────────────────────────── */
    .card-phone-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      text-decoration: none;
      margin-bottom: 20px;
    }

    .card-phone-link:active { color: var(--red); }

    /* ── CARD HOURS ──────────────────────────────── */
    .card-hours-wrap {
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--light);
    }

    .card-hours-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .hours-line {
      font-size: 12px;
      color: var(--black);
      line-height: 1.9;
    }

    /* ── MAP ─────────────────────────────────────── */
    #store-map {
      display: none;
      margin-bottom: 16px;
      height: 220px;
      border: 1px solid var(--mid);
    }

    /* ── NAV BUTTONS ─────────────────────────────── */
    .map-buttons { display: flex; gap: 10px; }

    .map-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      border: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .map-btn:active { opacity: 0.7; }
    .map-btn.google { background: var(--black); color: var(--white); }
    .map-btn.apple  { background: var(--white); color: var(--black); border: 1px solid var(--black); }

    /* ── DIVIDER ─────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 16px;
    }

    .divider span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--mid);
    }

    /* ── STORE LIST ──────────────────────────────── */
    #store-list { display: flex; flex-direction: column; }

    #store-list-wrap { display: none; }

    .store-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--mid);
      -webkit-tap-highlight-color: transparent;
    }

    .store-item:first-child { border-top: 1px solid var(--mid); }
    .store-item.highlighted .city { color: var(--red); }

    .store-item-left { flex: 1; min-width: 0; }

    .store-item-left .city {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .store-item-left .addr {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .store-hours {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .store-item-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .store-dist {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .store-dist.near { color: var(--red); }

    .mini-btns { display: flex; gap: 6px; }

    .mini-map-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid var(--mid);
      text-decoration: none;
      color: var(--black);
      -webkit-tap-highlight-color: transparent;
    }

    .mini-map-btn:active { background: var(--light); border-color: var(--black); }

    /* ── SPINNER ─────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px 16px;
      border-top: 1px solid var(--mid);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>

    <div class="divider" style="margin-top:28px"><span>Altri store</span></div>

      Indietro

    <div class="divider"><span>Tutti gli store</span></div>

</main>

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function googleMapsUrl(store) {
    const q = encodeURIComponent(`${store.address}, ${store.city}, Sicilia, Italia`);
    return `https://www.google.com/maps/dir/?api=1&destination=${q}`;
  }

  function appleMapsUrl(store) {
    const q = encodeURIComponent(`${store.address}, ${store.city}, Sicilia, Italia`);
    return `https://maps.apple.com/?daddr=${q}&dirflg=d`;
  }

  function telHref(phone) {
    return "tel:" + phone.replace(/\s/g, "");
  }

  function formatDist(km) {
    return km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(1)} km`;
  }

  const phoneSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>`;
  const pinSvg   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5 14.5 7.62 14.5 9 13.38 11.5 12 11.5z"/></svg>`;
  const appleSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.39.07 2.35.74 3.15.8 1.2-.24 2.35-.93 3.64-.84 1.54.12 2.7.71 3.44 1.8-3.18 1.94-2.43 5.86.48 6.95-.57 1.56-1.32 3.09-2.71 4.15zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>`;

  function storeItemHtml(store, idx, showDist) {
    const distHtml = showDist && store.dist !== null
      ? `<div class="store-dist${store.dist < 10 ? " near" : ""}">${formatDist(store.dist)}</div>`
      : "";
    const hoursCompact = store.hours ? store.hours.replace(/\s*\|\s*/g, " · ") : "";
    return `
      <div class="store-item-left">
        <div class="city">${store.city}</div>
        <div class="addr">${store.address}</div>
        ${hoursCompact ? `<div class="store-hours">${hoursCompact}</div>` : ""}
      </div>
      <div class="store-item-right">
        ${distHtml}
        <div class="mini-btns">
          ${store.phone ? `<a class="mini-map-btn" href="${telHref(store.phone)}" aria-label="Chiama">${phoneSvg}</a>` : ""}
          <a class="mini-map-btn" href="${googleMapsUrl(store)}" target="_blank" rel="noopener" aria-label="Google Maps">${pinSvg}</a>
          <a class="mini-map-btn" href="${appleMapsUrl(store)}" target="_blank" rel="noopener" aria-label="Apple Maps">${appleSvg}</a>
        </div>
      </div>`;
  }

  function renderNearestList(distances) {
    const list = document.getElementById("store-list");
    list.innerHTML = "";
    const items = STORES.map((s, i) => ({ ...s, dist: distances[i] })).sort((a, b) => a.dist - b.dist);
    items.slice(1).forEach((store, idx) => {
      const item = document.createElement("div");
      item.className = "store-item";
      item.innerHTML = storeItemHtml(store, idx, true);
      list.appendChild(item);
    });
  }

  function renderAllList() {
    const list = document.getElementById("store-list-all");
    list.innerHTML = "";
    STORES.forEach((store, idx) => {
      const item = document.createElement("div");
      item.className = "store-item";
      item.innerHTML = storeItemHtml(store, idx, false);
      list.appendChild(item);
    });
  }

  function showChoiceScreen() {
    document.getElementById("choice-screen").style.display = "flex";
    document.getElementById("nearest-view").style.display = "none";
    document.getElementById("all-stores-view").style.display = "none";
    document.getElementById("status").textContent = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function showAllStores() {
    document.getElementById("choice-screen").style.display = "none";
    document.getElementById("nearest-view").style.display = "none";
    document.getElementById("all-stores-view").style.display = "block";
    renderAllList();
    window.scrollTo({ top: 0, behavior: "instant" });
  }

  function startLocate() {
    if (!navigator.geolocation) {
      setStatus("Il tuo browser non supporta la geolocalizzazione.", true);
      return;
    }

    document.getElementById("choice-screen").style.display = "none";
    document.getElementById("nearest-view").style.display = "block";
    document.getElementById("closest-card").style.display = "none";
    document.getElementById("store-map").style.display = "none";

    setStatus("Rilevamento posizione in corso…");
    window.scrollTo({ top: 0, behavior: "instant" });

    navigator.geolocation.getCurrentPosition(
      ({ coords: { latitude, longitude } }) => {
        const distances = STORES.map(s => haversineKm(latitude, longitude, s.lat, s.lng));
        const minIdx = distances.indexOf(Math.min(...distances));
        const closest = STORES[minIdx];

        document.getElementById("card-city").textContent = closest.city;
        document.getElementById("card-address").textContent = closest.address;
        document.getElementById("card-distance").textContent = `A ${formatDist(distances[minIdx])} da te`;
        document.getElementById("card-google").href = googleMapsUrl(closest);
        document.getElementById("card-apple").href = appleMapsUrl(closest);

        const phoneEl = document.getElementById("card-phone");
        const phoneTextEl = document.getElementById("card-phone-text");
        if (closest.phone) {
          phoneEl.href = telHref(closest.phone);
          phoneTextEl.textContent = closest.phone;
          phoneEl.style.display = "inline-flex";
        } else {
          phoneEl.style.display = "none";
        }

        const hoursEl = document.getElementById("card-hours");
        const hoursWrap = document.getElementById("card-hours-wrap");
        if (closest.hours) {
          hoursEl.innerHTML = closest.hours
            .split("|")
            .map(h => `<div class="hours-line">${h.trim()}</div>`)
            .join("");
          hoursWrap.style.display = "block";
        } else {
          hoursWrap.style.display = "none";
        }

        document.getElementById("closest-card").style.display = "block";

        showMap(closest.lat, closest.lng, latitude, longitude);
        renderNearestList(distances);
        setStatus("");
      },
      (err) => {
        const msgs = {
          1: "Permesso negato. Abilita la posizione nelle impostazioni.",
          2: "Posizione non disponibile. Riprova.",
          3: "Richiesta scaduta. Riprova.",
        };
        setStatus(msgs[err.code] || "Impossibile ottenere la posizione.", true);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let leafletMap = null;

  function showMap(storeLat, storeLng, userLat, userLng) {
    const mapEl = document.getElementById("store-map");
    mapEl.style.display = "block";

    if (leafletMap) { leafletMap.remove(); leafletMap = null; }

    leafletMap = L.map("store-map", { zoomControl: false, scrollWheelZoom: false });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(leafletMap);

    const storeIcon = L.divIcon({
      className: "",
      html: `<div style="width:16px;height:16px;background:#cc1a1a;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>`,
      iconSize: [16, 16], iconAnchor: [8, 8],
    });

    const userIcon = L.divIcon({
      className: "",
      html: `<div style="width:13px;height:13px;background:#0a0a0a;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>`,
      iconSize: [13, 13], iconAnchor: [6, 6],
    });

    L.marker([storeLat, storeLng], { icon: storeIcon })
      .addTo(leafletMap)
      .bindPopup("<b style='font-family:sans-serif;font-size:13px'>H.2 Collection</b>")
      .openPopup();

    L.marker([userLat, userLng], { icon: userIcon })
      .addTo(leafletMap)
      .bindPopup("<span style='font-family:sans-serif;font-size:13px'>La tua posizione</span>");

    leafletMap.fitBounds(
      L.latLngBounds([[storeLat, storeLng], [userLat, userLng]]),
      { padding: [36, 36] }
    );
  }
</script>

</body>
